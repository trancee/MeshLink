repos:
  - repo: local
    hooks:
      - id: detekt
        name: detekt
        description: Run detekt static analysis
        entry: ./gradlew detekt --no-daemon
        language: system
        pass_filenames: false
        always_run: true

      - id: gitlint
        name: gitlint
        description: Lint commit message (conventional commits)
        entry: gitlint --staged --msg-filename
        language: system
        stages: [commit-msg]
