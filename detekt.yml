build:
  maxIssues: 0

complexity:
  LargeClass:
    threshold: 850
  LongMethod:
    threshold: 170
  LongParameterList:
    functionThreshold: 12
    constructorThreshold: 45
  TooManyFunctions:
    thresholdInClasses: 50
    thresholdInFiles: 50
    thresholdInObjects: 30
    thresholdInInterfaces: 25
  CyclomaticComplexMethod:
    threshold: 25
  NestedBlockDepth:
    threshold: 5

formatting:
  active: true
  MaximumLineLength:
    active: false
  TrailingCommaOnCallSite:
    active: false
  TrailingCommaOnDeclarationSite:
    active: false
  NoWildcardImports:
    active: true
    packagesToUseImportOnDemandProperty: 'bluetooth'
  Wrapping:
    active: true
  Indentation:
    active: true
  ArgumentListWrapping:
    active: true
  ParameterListWrapping:
    active: true
  SpacingAroundOperators:
    active: true
  NoMultipleSpaces:
    active: true
  MultiLineIfElse:
    active: true
  ImportOrdering:
    active: true
  SpacingBetweenDeclarationsWithAnnotations:
    active: true
  SpacingBetweenDeclarationsWithComments:
    active: true
  NoConsecutiveBlankLines:
    active: true

naming:
  FunctionNaming:
    active: true
  VariableNaming:
    active: true
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9_]*'
  MatchingDeclarationName:
    active: false

style:
  MagicNumber:
    active: false
  ReturnCount:
    max: 10
  ForbiddenComment:
    active: false
  MaxLineLength:
    maxLineLength: 160
  WildcardImport:
    active: true
    excludeImports:
      - 'bluetooth.*'
  UnusedPrivateMember:
    active: true
  UnnecessaryAbstractClass:
    active: true
  LoopWithTooManyJumpStatements:
    active: false
  ThrowsCount:
    active: false
  UseCheckOrError:
    active: false
  UseRequire:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
