# MeshLink detekt configuration
# Builds upon detekt's built-in default config (buildUponDefaultConfig = true in build.gradle.kts).
# Only project-specific overrides and explicit ruleset activation are listed here.

build:
  maxIssues: 0

# ── Complexity ──────────────────────────────────────────────────────────────
complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 10
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 10

# ── Naming ───────────────────────────────────────────────────────────────────
naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'

# ── Style ────────────────────────────────────────────────────────────────────
style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 120
  MagicNumber:
    active: false  # Protocol constants are intentional; disable to reduce noise
  ReturnCount:
    active: true
    max: 2
  ThrowsCount:
    active: true
    max: 2
  UnusedImports:
    active: true
  WildcardImport:
    active: true
