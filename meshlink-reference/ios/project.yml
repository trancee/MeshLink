name: ReferenceApp
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    DEVELOPMENT_ASSET_PATHS: '""'
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    FRAMEWORK_SEARCH_PATHS: '$(inherited) "$(SRCROOT)/../build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"'
    GENERATE_INFOPLIST_FILE: NO
    LD_RUNPATH_SEARCH_PATHS: '$(inherited) @executable_path/Frameworks'
    OTHER_LDFLAGS: '$(inherited) -framework ReferenceAppShared'
    PRODUCT_NAME: "$(TARGET_NAME)"
targets:
  ReferenceApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    productBundleIdentifier: ch.trancee.meshlink.reference.ios
    sources:
      - path: ReferenceApp
    preBuildScripts:
      - name: Build ReferenceApp shared framework
        basedOnDependencyAnalysis: false
        script: |
          if [ "YES" = "$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED" ]; then
              echo "Skipping Gradle build task invocation due to OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED environment variable set to \"YES\""
              exit 0
          fi
          cd "$SRCROOT/../.."
          ./gradlew :meshlink-reference:embedAndSignAppleFrameworkForXcode
    settings:
      base:
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: ReferenceApp/Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: ch.trancee.meshlink.reference.ios
        TARGETED_DEVICE_FAMILY: "1"

  ReferenceAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: ReferenceAppTests
    dependencies:
      - target: ReferenceApp
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ch.trancee.meshlink.reference.ios.tests

  ReferenceAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: ReferenceAppUITests
    dependencies:
      - target: ReferenceApp
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ch.trancee.meshlink.reference.ios.uitests
