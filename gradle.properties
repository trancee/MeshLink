org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC
org.gradle.parallel=true
org.gradle.caching=true
kotlin.code.style=official
android.useAndroidX=true
kotlin.native.ignoreDisabledTargets=true
kotlin.native.enableKlibsCrossCompilation=false
kotlin.mpp.enableCInteropCommonization=true
VERSION_NAME=0.1.0
GROUP=ch.trancee
# Dokka 2.0.0 ships with V1 API active by default; V2 must be explicitly enabled.
# V2EnabledWithHelpers adds compatibility shims that let V1 consumer code keep working.
org.jetbrains.dokka.experimental.gradle.pluginMode=V2EnabledWithHelpers
# AGP 9.0+ blocks com.android.application + kotlin.multiplatform by default because
# its built-in Kotlin support conflicts with the KMP plugin. This workaround allows
# the :meshlink-sample CMP application module to apply both plugins simultaneously.
# Safe for :meshlink which uses com.android.kotlin.multiplatform.library (separate path).
android.builtInKotlin=false
android.newDsl=false
