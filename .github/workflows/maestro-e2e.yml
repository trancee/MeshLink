# Maestro E2E – runs UI flows on Android emulator and iOS simulator
# using maestro-runner (no JVM required, ~3.6× faster than Maestro CLI).
#
# Android: Builds the sample APK, boots an emulator, runs e2e flows.
# iOS:     Builds the sample app, boots a simulator, runs iOS flows.
#
# Triggered on pushes/PRs that touch sample app code, maestro flows,
# or this workflow. Can also be triggered manually.

name: Maestro E2E

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'meshlink-sample/**'
      - 'maestro/**'
      - '.github/workflows/maestro-e2e.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'meshlink-sample/**'
      - 'maestro/**'
      - '.github/workflows/maestro-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  MAESTRO_RUNNER_VERSION: "1.1.0"

jobs:
  android-e2e:
    name: Android E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ── Toolchain ────────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      # ── Enable KVM (must happen before emulator-runner) ──────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── AVD cache ────────────────────────────────────────────────────
      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-33-${{ runner.os }}

      # ── Build APK + install maestro-runner in parallel ───────────────
      - name: Build APK & install maestro-runner
        run: |
          # Start APK build in background
          ./gradlew :meshlink-sample:android:assembleDebug --build-cache --parallel &
          GRADLE_PID=$!

          # Download and install maestro-runner while Gradle builds
          curl -fsSL -o maestro-runner.tar.gz \
            "https://github.com/devicelab-dev/maestro-runner/releases/download/v${MAESTRO_RUNNER_VERSION}/maestro-runner-${MAESTRO_RUNNER_VERSION}-linux-amd64.tar.gz"
          tar xzf maestro-runner.tar.gz --warning=no-unknown-keyword
          sudo mv maestro-runner /opt/maestro-runner
          sudo chmod -R a+rw /opt/maestro-runner
          sudo ln -sf /opt/maestro-runner/bin/maestro-runner /usr/local/bin/maestro-runner
          rm -f maestro-runner.tar.gz
          maestro-runner --version

          # Wait for Gradle to finish
          wait $GRADLE_PID

      # ── Boot emulator & run flows ────────────────────────────────────
      - name: Run Android E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            adb install meshlink-sample/android/build/outputs/apk/debug/android-debug.apk

            # Pre-grant permissions so flows never see permission dialogs
            adb shell pm grant io.meshlink.sample android.permission.BLUETOOTH_SCAN
            adb shell pm grant io.meshlink.sample android.permission.BLUETOOTH_CONNECT
            adb shell pm grant io.meshlink.sample android.permission.BLUETOOTH_ADVERTISE
            adb shell pm grant io.meshlink.sample android.permission.ACCESS_FINE_LOCATION

            maestro-runner --platform android --output ./reports/android --flatten --wait-for-idle-timeout 500 test maestro/flows/android/

      # ── Upload reports ────────────────────────────────────────────────
      - name: Publish JUnit report
        if: success() || failure()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'reports/android/junit-report.xml'
          check_name: 'Android E2E Results'

      - name: Upload E2E reports
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-reports
          path: reports/android/
          retention-days: 14

  ios-e2e:
    name: iOS E2E Tests
    runs-on: macos-15
    timeout-minutes: 25
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.workers.max=3
        -Dkotlin.native.jvmArgs=-Xmx3g
      MAESTRO_RUNNER_HOME: /opt/maestro-runner
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ── Toolchain ────────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      # Cache the WDA build (~283MB) to skip the 5-10 min xcodebuild on subsequent runs.
      # Key includes maestro-runner version AND Xcode version (WDA must match simulator SDK).
      - name: Get Xcode version
        id: xcode
        run: echo "version=$(xcodebuild -version | head -1 | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache WebDriverAgent build
        uses: actions/cache@v5
        with:
          path: /tmp/wda-cache
          key: wda-${{ runner.os }}-${{ env.MAESTRO_RUNNER_VERSION }}-xcode${{ steps.xcode.outputs.version }}

      # ── Build iOS Simulator framework + boot simulator + install maestro-runner ──
      #    Only build the simulator slice (not arm64 device or macOS) — saves ~3 min.
      #    All three tasks run in parallel to overlap I/O-bound work.
      - name: Build framework, boot simulator & install maestro-runner
        run: |
          # Build only the iOS Simulator framework (skips IosArm64 + MacosArm64 compilation)
          ./gradlew :meshlink:linkReleaseFrameworkIosSimulatorArm64 --build-cache --parallel &
          GRADLE_PID=$!

          # Boot simulator while Gradle compiles Kotlin/Native
          xcrun simctl boot "iPhone 16" 2>/dev/null || true

          # Download and install maestro-runner
          curl -fsSL -o maestro-runner.tar.gz \
            "https://github.com/devicelab-dev/maestro-runner/releases/download/v${MAESTRO_RUNNER_VERSION}/maestro-runner-${MAESTRO_RUNNER_VERSION}-darwin-arm64.tar.gz"
          tar xzf maestro-runner.tar.gz
          sudo mv maestro-runner /opt/maestro-runner
          sudo chmod -R a+rw /opt/maestro-runner
          sudo ln -sf /opt/maestro-runner/bin/maestro-runner /usr/local/bin/maestro-runner
          rm -f maestro-runner.tar.gz
          maestro-runner --version

          # Restore WDA build cache (if available)
          mkdir -p /opt/maestro-runner/cache
          if [ -d /tmp/wda-cache/wda-builds ]; then
            echo "Restoring WDA build cache..."
            cp -R /tmp/wda-cache/wda-builds /opt/maestro-runner/cache/
          fi

          # Wait for Gradle to finish
          wait $GRADLE_PID

          # Create a single-slice XCFramework at the path Package.swift expects
          FRAMEWORK_DIR="meshlink/build/bin/iosSimulatorArm64/releaseFramework"
          XCFW_OUT="meshlink/build/XCFrameworks/release/MeshLink.xcframework"
          rm -rf "$XCFW_OUT"
          xcodebuild -create-xcframework \
            -framework "$FRAMEWORK_DIR/MeshLink.framework" \
            -output "$XCFW_OUT"

      # ── Build iOS sample app ──────────────────────────────────────────
      - name: Build iOS sample app
        working-directory: meshlink-sample/ios
        run: |
          xcodebuild build \
            -project MeshLinkSample.xcodeproj \
            -scheme MeshLinkSample \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      # ── Run flows ────────────────────────────────────────────────────
      - name: Run iOS E2E flows
        run: |
          APP_PATH=$(find meshlink-sample/ios/build -name "*.app" -path "*/Debug-iphonesimulator/*" -not -path "*/dSYMs/*" | head -1)
          echo "APP_PATH=$APP_PATH"
          test -d "$APP_PATH" || { echo "Error: .app not found"; exit 1; }

          # Pre-grant permissions so flows never see permission dialogs
          xcrun simctl privacy booted grant bluetooth io.meshlink.sample 2>/dev/null || true
          xcrun simctl privacy booted grant location-always io.meshlink.sample 2>/dev/null || true

          maestro-runner --platform ios --app-file "$APP_PATH" --output ./reports/ios --flatten --typing-frequency 20 test maestro/flows/ios/

      # ── Save WDA build cache for next run ─────────────────────────────
      - name: Save WDA build cache
        if: success() || failure()
        run: |
          if [ -d /opt/maestro-runner/cache/wda-builds ]; then
            mkdir -p /tmp/wda-cache
            cp -R /opt/maestro-runner/cache/wda-builds /tmp/wda-cache/
          fi

      # ── Upload reports ────────────────────────────────────────────────
      - name: Publish JUnit report
        if: success() || failure()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'reports/ios/junit-report.xml'
          check_name: 'iOS E2E Results'

      - name: Upload E2E reports
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-reports
          path: reports/ios/
          retention-days: 14
