# Maestro E2E – runs UI flows on Android emulator and iOS simulator
# using maestro-runner (no JVM required, ~3.6× faster than Maestro CLI).
#
# Android: Builds the sample APK, boots an emulator, runs e2e flows.
# iOS:     Builds the sample app, boots a simulator, runs iOS flows.
#
# Triggered on pushes/PRs that touch sample app code, maestro flows,
# or this workflow. Can also be triggered manually.

name: Maestro E2E

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'meshlink-sample/**'
      - 'maestro/**'
      - '.github/workflows/maestro-e2e.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'meshlink-sample/**'
      - 'maestro/**'
      - '.github/workflows/maestro-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  MAESTRO_RUNNER_VERSION: "1.1.0"

jobs:
  android-e2e:
    name: Android E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      # ── Toolchain ────────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      # ── Build sample APK ─────────────────────────────────────────────
      - name: Build Android sample APK
        run: ./gradlew :meshlink-sample:android:assembleDebug

      # ── Enable KVM for hardware acceleration ─────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── AVD cache ────────────────────────────────────────────────────
      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-33-${{ runner.os }}

      # ── Install maestro-runner ────────────────────────────────────────
      - name: Install maestro-runner
        run: |
          curl -fsSL -o maestro-runner.tar.gz \
            "https://github.com/devicelab-dev/maestro-runner/releases/download/v${MAESTRO_RUNNER_VERSION}/maestro-runner-${MAESTRO_RUNNER_VERSION}-linux-amd64.tar.gz"
          tar xzf maestro-runner.tar.gz
          sudo mv maestro-runner/bin/maestro-runner /usr/local/bin/
          sudo chmod +x /usr/local/bin/maestro-runner
          maestro-runner --version

      # ── Boot emulator & run flows ────────────────────────────────────
      - name: Run Android E2E flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          script: |
            adb install meshlink-sample/android/build/outputs/apk/debug/android-debug.apk

            maestro-runner \
              --platform android \
              --output ./reports/android \
              --flatten \
              --wait-for-idle-timeout 500 \
              maestro/flows/e2e/

      # ── Upload reports ────────────────────────────────────────────────
      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'reports/android/junit-report.xml'
          check_name: 'Android E2E Results'

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-e2e-reports
          path: reports/android/
          retention-days: 14

  ios-e2e:
    name: iOS E2E Tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      # ── Toolchain ────────────────────────────────────────────────────
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      # ── Build iOS sample app ──────────────────────────────────────────
      - name: Build iOS sample app
        working-directory: meshlink-sample/ios
        run: |
          xcodebuild build-for-testing \
            -project MeshLinkSample.xcodeproj \
            -scheme MeshLinkSample \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

          # Also build .app for maestro-runner
          xcodebuild build \
            -project MeshLinkSample.xcodeproj \
            -scheme MeshLinkSample \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      # ── Install maestro-runner ────────────────────────────────────────
      - name: Install maestro-runner
        run: |
          curl -fsSL -o maestro-runner.tar.gz \
            "https://github.com/devicelab-dev/maestro-runner/releases/download/v${MAESTRO_RUNNER_VERSION}/maestro-runner-${MAESTRO_RUNNER_VERSION}-darwin-arm64.tar.gz"
          tar xzf maestro-runner.tar.gz
          sudo mv maestro-runner/bin/maestro-runner /usr/local/bin/
          sudo chmod +x /usr/local/bin/maestro-runner
          maestro-runner --version

      # ── Boot simulator & run flows ───────────────────────────────────
      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl list devices booted

      - name: Install app & run iOS E2E flows
        run: |
          APP_PATH=$(find meshlink-sample/ios/build -name "*.app" -path "*/Debug-iphonesimulator/*" | head -1)

          maestro-runner \
            --platform ios \
            --app-file "$APP_PATH" \
            --output ./reports/ios \
            --flatten \
            --typing-frequency 20 \
            maestro/flows/ios/

      # ── Upload reports ────────────────────────────────────────────────
      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'reports/ios/junit-report.xml'
          check_name: 'iOS E2E Results'

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-e2e-reports
          path: reports/ios/
          retention-days: 14
