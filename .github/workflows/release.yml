name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-android:
    name: Publish Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      # TODO: Implement Android AAR publishing to Maven Central once signing and
      #       OSSRH publishing are configured (post-M001).
      - name: Publish to Maven Central (TODO)
        run: |
          echo "TODO: ./gradlew :meshlink:publishAllPublicationsToMavenCentralRepository"
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

  publish-ios:
    name: Publish iOS XCFramework
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      # TODO: Assemble XCFramework (iosArm64 + iosSimulatorArm64) and attach it
      #       as a GitHub Release asset once the iOS implementation is complete (S03).
      - name: Assemble XCFramework and create release (TODO)
        run: |
          echo "TODO: ./gradlew :meshlink:assembleMeshLinkXCFramework"
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
