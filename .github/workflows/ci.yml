name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'meshlink/src/**'
      - 'meshlink/build.gradle.kts'
      - 'meshlink-sample/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'detekt.yml'
      - '.github/workflows/ci.yml'
      - '!**/*.md'
  pull_request:
    branches: [ main ]
    paths:
      - 'meshlink/src/**'
      - 'meshlink/build.gradle.kts'
      - 'meshlink-sample/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'detekt.yml'
      - '.github/workflows/ci.yml'
      - '!**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # ── Lint + JVM tests in one job (saves a full runner boot + Gradle init) ──
  lint-and-jvm-test:
    name: Detekt + JVM Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      # Run detekt and JVM tests in a single Gradle invocation —
      # Gradle resolves the task graph once, shares configuration cache,
      # and avoids a second daemon startup.
      - name: Run detekt + JVM tests
        run: ./gradlew detekt :meshlink:jvmTest --parallel

      - name: Publish test report
        if: success() || failure()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'meshlink/build/test-results/jvmTest/**/*.xml'
          check_name: 'JVM Test Results'

      - name: Upload test reports
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: jvm-test-reports
          path: meshlink/build/reports/tests/jvmTest/
          retention-days: 14

  # ── Android compile + sample apps in one job ──────────────────────────
  android-test:
    name: Android Compile + Samples
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      # Single Gradle invocation compiles the library AND both sample apps.
      - name: Compile Android + build samples
        run: ./gradlew :meshlink:compileAndroidMain :meshlink-sample:android:assembleDebug :meshlink-sample:jvm:build --parallel

  # ── iOS + macOS tests in one job (saves a macOS runner boot ~2-3 min) ──
  apple-test:
    name: iOS + macOS Tests
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      # Run both Apple test suites in one Gradle invocation.
      # Kotlin/Native compilation is shared between iOS and macOS targets.
      - name: Run iOS + macOS tests
        run: ./gradlew :meshlink:iosSimulatorArm64Test :meshlink:macosArm64Test --parallel

      - name: Publish iOS test report
        if: success() || failure()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'meshlink/build/test-results/iosSimulatorArm64Test/**/*.xml'
          check_name: 'iOS Test Results'

      - name: Publish macOS test report
        if: success() || failure()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'meshlink/build/test-results/macosArm64Test/**/*.xml'
          check_name: 'macOS Test Results'

      - name: Upload test reports
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: apple-test-reports
          path: |
            meshlink/build/reports/tests/iosSimulatorArm64Test/
            meshlink/build/reports/tests/macosArm64Test/
          retention-days: 14

  linux-test:
    name: Linux Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Run Linux x64 tests
        run: ./gradlew :meshlink:linuxX64Test --parallel

      - name: Publish test report
        if: success() || failure()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'meshlink/build/test-results/linuxX64Test/**/*.xml'
          check_name: 'Linux Test Results'

      - name: Upload test reports
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: linux-test-reports
          path: meshlink/build/reports/tests/linuxX64Test/
          retention-days: 14
