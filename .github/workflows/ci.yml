name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run ktfmt check and detekt
        run: ./gradlew :meshlink:ktfmtCheck :meshlink:detekt

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run all tests (commonTest on JVM)
        run: ./gradlew :meshlink:allTests

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify 100% line and branch coverage
        run: ./gradlew :meshlink:koverVerify
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: meshlink/build/reports/kover/html/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    # Independent job — never blocks merge. Hardware variance across CI runners
    # makes hard thresholds brittle; benchmark is warn-only per spec/12 §B.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run benchmarks (warn-only)
        run: ./gradlew :meshlink:benchmark
