name: ci

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'
      - '.gsd/**'
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'specs/**'
      - '.gsd/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meshlink-sdk-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Verify MeshLink SDK on Linux
        run: |
          # The hosted Linux runners still expose tight CPU budgets for this suite.
          # Keep verification single-worker so the routing and transfer integration
          # tests do not starve while JVM and Android host tasks execute.
          # Markdown link and generated-API-reference checks live in docs.yml.
          ./gradlew \
            :meshlink:jvmTest \
            :meshlink:testAndroidHostTest \
            :meshlink:detekt \
            :meshlink:apiCheck \
            :meshlink:koverVerify \
            checkAgp9Invariants \
            --max-workers=1 \
            --console=plain

      - name: Upload verification reports
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: meshlink-linux-reports
          if-no-files-found: ignore
          path: |
            build/reports/**
            meshlink/build/reports/**
            **/test-results/**

  meshlink-sdk-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify MeshLink SDK on macOS targets
        run: |
          # The hosted macOS runner currently exposes only 3 CPUs; keep iOS verification
          # single-worker so Kotlin/Native compilation and simulator test tasks stay stable.
          ./gradlew \
            :meshlink:iosSimulatorArm64Test \
            --max-workers=1 \
            --console=plain

      - name: Upload verification reports
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: meshlink-macos-reports
          if-no-files-found: ignore
          path: |
            build/reports/**
            meshlink/build/reports/**
            **/test-results/**

  meshlink-swiftpm-macos:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build SwiftPM packaging artifact
        run: ./scripts/spm/package-meshlink-xcframework.sh

      - name: Upload SwiftPM packaging outputs
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: meshlink-swiftpm-reports
          if-no-files-found: ignore
          path: |
            meshlink/build/swiftpm/**
            meshlink/build/XCFrameworks/**
