name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
      - name: Run ktfmt check and detekt
        run: ./gradlew :meshlink:ktfmtCheck :meshlink:detekt

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
      - name: Run all tests (commonTest on JVM)
        run: ./gradlew :meshlink:allTests
      - name: Verify 100% line and branch coverage
        if: success()
        run: ./gradlew :meshlink:koverVerify :meshlink:koverHtmlReport :meshlink:koverXmlReport
      - name: Post coverage to job summary
        if: success()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os, sys
          try:
              root = ET.parse('meshlink/build/reports/kover/report.xml').getroot()
              totals = {c.get('type'): c for c in root.findall('counter')}
              def pct(c):
                  if c is None: return 'n/a'
                  missed, covered = int(c.get('missed', 0)), int(c.get('covered', 0))
                  total = missed + covered
                  return f'{100.0 * covered / total:.1f}%' if total else '100.0%'
              md = (
                  '## \U0001f4ca Coverage\n'
                  '| Metric | Coverage |\n'
                  '|--------|---------:|\n'
                  f'| Lines    | {pct(totals.get("LINE"))} |\n'
                  f'| Branches | {pct(totals.get("BRANCH"))} |\n'
              )
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write(md)
          except Exception as e:
              print(f'Coverage summary failed: {e}', file=sys.stderr)
          PYEOF
      - name: Upload HTML coverage report
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: meshlink/build/reports/kover/html/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    # Independent job — never blocks merge. Hardware variance across CI runners
    # makes hard thresholds brittle; benchmark is warn-only per spec/12 §B.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never
      - name: Run benchmarks (warn-only)
        run: ./gradlew :meshlink:jvmCiBenchmark
      - name: Post benchmark results to job summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, glob, os, sys
          REGRESSION_THRESHOLD = 15.0  # % — matches spec/12 §B ±10-15% guideline
          try:
              files = sorted(glob.glob(
                  'meshlink/build/reports/benchmarks/**/*.json', recursive=True))
              if not files:
                  sys.exit(0)
              results = []
              for f in files:
                  with open(f) as fp:
                      data = json.load(fp)
                  if isinstance(data, list):
                      results.extend(data)

              # Load committed baseline for delta comparison.
              baseline = {}
              baseline_path = 'benchmarks/baselines/jvm.json'
              if os.path.exists(baseline_path):
                  with open(baseline_path) as f:
                      for r in json.load(f):
                          baseline[r['benchmark']] = r['primaryMetric']['score']

              has_baseline = bool(baseline)
              header = ('| Benchmark | Score | ±Error | Unit | vs Baseline |\n'
                        '|-----------|------:|-------:|------|:-----------:|\n'
                        if has_baseline else
                        '| Benchmark | Score | ±Error | Unit |\n'
                        '|-----------|------:|-------:|------|\n')
              rows = []
              regressions = []
              for r in results:
                  name = r['benchmark'].rsplit('.', 1)[-1]
                  m = r['primaryMetric']
                  score, error, unit = m['score'], m['scoreError'], m['scoreUnit']
                  row = (f'| `{name}` | {score:,.0f} | \u00b1{error:,.0f} | {unit} |')
                  if has_baseline:
                      base = baseline.get(r['benchmark'])
                      if base and base > 0:
                          delta = (score - base) / base * 100
                          sign = '+' if delta >= 0 else ''
                          if delta < -REGRESSION_THRESHOLD:
                              badge = f'\U0001f534 {sign}{delta:.1f}%'
                              regressions.append(f'`{name}`: {sign}{delta:.1f}%')
                          elif delta > REGRESSION_THRESHOLD:
                              badge = f'\U0001f7e2 {sign}{delta:.1f}%'
                          else:
                              badge = f'{sign}{delta:.1f}%'
                          row += f' {badge} |'
                      else:
                          row += ' new |'
                  rows.append(row + '\n')

              warning = (f'\n> \u26a0\ufe0f Regressions \u003e{REGRESSION_THRESHOLD:.0f}%: '
                         + ', '.join(regressions) + '\n'
                         if regressions else '')
              md = ('## \u26a1 Benchmarks\n' + header + ''.join(rows) + warning)
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
                  f.write(md)
          except Exception as e:
              print(f'Benchmark summary failed: {e}', file=sys.stderr)
          PYEOF
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: meshlink/build/reports/benchmarks/
