name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'meshlink/src/**'
      - 'meshlink/build.gradle.kts'
      - 'meshlink-sample/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'detekt.yml'
      - '.github/workflows/ci.yml'
      - '!**/*.md'
  pull_request:
    branches: [ main ]
    paths:
      - 'meshlink/src/**'
      - 'meshlink/build.gradle.kts'
      - 'meshlink-sample/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - 'detekt.yml'
      - '.github/workflows/ci.yml'
      - '!**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Run detekt
        run: ./gradlew detekt

  jvm-test:
    name: JVM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Run JVM tests
        run: ./gradlew :meshlink:jvmTest --parallel

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jvm-test-reports
          path: meshlink/build/reports/tests/jvmTest/
          retention-days: 14

  android-compile:
    name: Android Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Compile Android
        run: ./gradlew :meshlink:compileAndroidMain

  apple-test:
    name: iOS & macOS Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Run iOS Simulator & macOS tests
        run: ./gradlew :meshlink:iosSimulatorArm64Test :meshlink:macosArm64Test --parallel

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: apple-test-reports
          path: |
            meshlink/build/reports/tests/iosSimulatorArm64Test/
            meshlink/build/reports/tests/macosArm64Test/
          retention-days: 14

  linux-test:
    name: Linux Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Run Linux x64 tests
        run: ./gradlew :meshlink:linuxX64Test --parallel

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-test-reports
          path: meshlink/build/reports/tests/linuxX64Test/
          retention-days: 14

  sample-apps:
    name: Sample Apps Build
    runs-on: ubuntu-latest
    needs: [ android-compile ]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Build Android sample
        run: ./gradlew :meshlink-sample:android:assembleDebug

      - name: Build JVM sample
        run: ./gradlew :meshlink-sample:jvm:build
