name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'meshlink/src/**'
      - 'meshlink/build.gradle.kts'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'meshlink/src/**'
      - 'meshlink/build.gradle.kts'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm-test:
    name: JVM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Run JVM tests
        run: ./gradlew :meshlink:jvmTest --parallel

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jvm-test-reports
          path: meshlink/build/reports/tests/jvmTest/
          retention-days: 14

  android-compile:
    name: Android Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile Android (release + debug)
        run: ./gradlew :meshlink:compileReleaseKotlinAndroid :meshlink:compileDebugKotlinAndroid --parallel

  ios-test:
    name: iOS Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Run iOS Simulator tests
        run: ./gradlew :meshlink:iosSimulatorArm64Test --parallel

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-test-reports
          path: meshlink/build/reports/tests/iosSimulatorArm64Test/
          retention-days: 14
