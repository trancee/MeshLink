version: 2

updates:
  # Gradle — library, plugin, and build-tool dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      # Transitive build-classpath deps pinned to patched versions via
      # buildscript resolutionStrategy — not direct dependencies in the
      # version catalog, so Dependabot cannot locate or update them.
      - dependency-name: "org.bouncycastle:bcprov-jdk18on"
      - dependency-name: "org.bouncycastle:bcpkix-jdk18on"
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
      android:
        patterns:
          - "com.android*"
          - "com.google.flatbuffers*"
      quality:
        patterns:
          - "io.gitlab.arturbosch.detekt*"
          - "com.ncorti.ktfmt*"
          - "org.jetbrains.kotlinx.kover*"
          - "org.jetbrains.kotlinx.binary-compatibility-validator*"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns:
          - "*"
