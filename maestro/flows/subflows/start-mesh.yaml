appId: io.meshlink.sample
name: Start Mesh
tags:
  - subflow
---
- tapOn: "Start Mesh"
# If permissions are already granted (CI pre-grants via adb/simctl),
# "Stop Mesh" appears immediately. If not (local dev first launch),
# a permission dialog blocks — tap through it then verify.
- runFlow:
    when:
      notVisible: "Stop Mesh"
    file: grant-permissions.yaml
- assertVisible: "Stop Mesh"
