appId: io.meshlink.sample
name: Grant Permissions
tags:
  - subflow
---
# ── Android 12+ BLE permission dialogs ──
# Only attempt if a permission dialog is actually showing.
# Single visibility check (~1s) instead of 5 optional taps (~35s).
- runFlow:
    when:
      platform: Android
      visible: "Allow"
    commands:
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: "While using the app"
          optional: true
      - tapOn:
          text: "Precise"
          optional: true

# ── iOS Bluetooth permission dialog ──
- runFlow:
    when:
      platform: iOS
      visible: "Would Like to Use Bluetooth"
    commands:
      - tapOn:
          text: "OK"
