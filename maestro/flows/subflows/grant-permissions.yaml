appId: io.meshlink.sample
name: Grant Permissions
tags:
  - subflow
---
# Called only when a permission dialog is blocking mesh start.
# In CI, permissions are pre-granted via adb/simctl so this never runs.
# Locally, this handles first-launch permission dialogs.

# ── Android 12+ BLE permission dialogs ──
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: "Allow"
          optional: true
      - tapOn:
          text: "While using the app"
          optional: true
      - tapOn:
          text: "Precise"
          optional: true

# ── iOS Bluetooth permission dialog ──
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn:
          text: "OK"
          optional: true
