appId: io.meshlink.sample
name: "[iOS] Settings - Mesh Status"
tags:
  - settings
  - lifecycle
  - ios
---
- launchApp:
    clearState: true

# Check settings before starting mesh
- tapOn: "Settings"
- scrollUntilVisible:
    element:
      text: "MESH STATUS"
    direction: DOWN
- assertVisible: "Stopped"

# Go back to Chat tab — use the tab item icon to avoid hitting
# the "Chat" label inside the segmented preset picker
- tapOn:
    id: "message"

- runFlow: ../subflows/start-mesh.yaml

# Return to Settings and verify running state
- tapOn: "Settings"
- scrollUntilVisible:
    element:
      text: "Running"
    direction: DOWN
- assertVisible: "Running"
- scrollUntilVisible:
    element:
      text: "Reachable Peers"
    direction: DOWN

# Stop mesh from Chat
- tapOn:
    id: "message"
- runFlow: ../subflows/stop-mesh.yaml

# Verify settings shows stopped
- tapOn: "Settings"
- scrollUntilVisible:
    element:
      text: "Stopped"
    direction: DOWN
- assertVisible: "Stopped"
