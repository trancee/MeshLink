appId: io.meshlink.sample
name: "[iOS] Diagnostics Screen"
tags:
  - diagnostics
  - ios
---
- launchApp:
    clearState: true

# Navigate to diagnostics
- tapOn: "Diagnostics"
- assertVisible: "Diagnostics"

# Should show empty state (text includes newline, use regex)
- assertVisible:
    text: "No diagnostic events yet.*"

# Verify filter buttons exist
- assertVisible:
    text: "All.*"

# Start mesh to generate diagnostic events
- tapOn: "Chat"
- runFlow: ../subflows/start-mesh.yaml

# Go back to diagnostics — should have events now
- tapOn: "Diagnostics"

# Wait for diagnostic events to appear
- extendedWaitUntil:
    visible:
      text: "INFO.*"
    timeout: 10000

# Test severity filter buttons
- tapOn:
    text: "INFO.*"
- tapOn:
    text: "All.*"

# Clear diagnostics via toolbar button
- tapOn: "Clear"

# Stop mesh
- tapOn: "Chat"
- runFlow: ../subflows/stop-mesh.yaml
