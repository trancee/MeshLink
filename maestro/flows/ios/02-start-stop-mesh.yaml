appId: io.meshlink.sample
name: "[iOS] Start and Stop Mesh"
tags:
  - smoke
  - lifecycle
  - ios
---
- launchApp

# Verify initial state
- assertVisible: "Start Mesh"
- assertVisible:
    text: "Connected peers:"

# Start the mesh
- runFlow: ../subflows/start-mesh.yaml

# Verify running state
- assertVisible: "Stop Mesh"

# Stop the mesh
- runFlow: ../subflows/stop-mesh.yaml

# Verify stopped state
- assertVisible: "Start Mesh"
