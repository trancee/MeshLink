appId: io.meshlink.sample
name: Settings - MTU Slider
tags:
  - settings
---
- launchApp:
    clearState: true

# Go to Settings
- tapOn:
    text: "^Settings$"
- waitForAnimationToEnd

# Verify MTU section exists (visible without scrolling)
- assertVisible: "MTU"
- assertVisible:
    text: "Current: .* bytes"

# Scroll down to Configuration Details
- swipe:
    direction: UP
    duration: 1000
- swipe:
    direction: UP
    duration: 1000
- assertVisible: "Configuration Details"
- assertVisible: "Power Mode"
