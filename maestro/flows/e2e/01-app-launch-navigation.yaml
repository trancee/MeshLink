appId: io.meshlink.sample
name: App Launch and Navigation
tags:
  - smoke
  - navigation
---
- launchApp:
    clearState: true

# Chat tab is shown by default
- assertVisible: "MeshLink Sample"
- assertVisible: "Mesh Health"
- assertVisible: "Start Mesh"
- assertVisible: "Recipient"
- assertVisible: "Event Log"

# Navigate to Mesh tab (use index to avoid matching "Mesh Health")
- tapOn:
    text: "^Mesh$"
- waitForAnimationToEnd
- assertVisible: "Mesh Visualizer"
- assertVisible: "No peers discovered yet"

# Navigate to Diagnostics tab
- tapOn:
    text: "^Diagnostics$"
- waitForAnimationToEnd
- assertVisible:
    text: "No diagnostic events yet.*"

# Navigate to Settings tab
- tapOn:
    text: "^Settings$"
- waitForAnimationToEnd
- assertVisible: "Mesh Status"
- assertVisible: "Config Preset"
- assertVisible: "MTU"

# Navigate back to Chat
- tapOn:
    text: "^Chat$"
- waitForAnimationToEnd
- assertVisible: "MeshLink Sample"
