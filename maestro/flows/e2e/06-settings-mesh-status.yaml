appId: io.meshlink.sample
name: Settings - Mesh Status
tags:
  - settings
  - lifecycle
---
- launchApp:
    clearState: true

# Check settings before starting mesh
- tapOn:
    text: "^Settings$"
- waitForAnimationToEnd
- assertVisible: "Stopped"

# Go back to Chat and start mesh
- tapOn:
    text: "^Chat$"
- waitForAnimationToEnd
- runFlow: ../subflows/start-mesh.yaml

# Return to Settings and verify running state
- tapOn:
    text: "^Settings$"
- waitForAnimationToEnd
- assertVisible: "Running"
- assertVisible:
    text: "Connected Peers"
- assertVisible:
    text: "Uptime"

# Stop mesh from Chat
- tapOn:
    text: "^Chat$"
- waitForAnimationToEnd
- runFlow: ../subflows/stop-mesh.yaml

# Verify settings shows stopped
- tapOn:
    text: "^Settings$"
- waitForAnimationToEnd
- assertVisible: "Stopped"
