appId: io.meshlink.sample
name: Mesh Visualizer
tags:
  - mesh
---
- launchApp:
    clearState: true

# Navigate to Mesh tab
- tapOn:
    text: "^Mesh$"
- waitForAnimationToEnd
- assertVisible: "Mesh Visualizer"

# Should show empty state before starting
- assertVisible: "No peers discovered yet"

# Verify status chips
- assertVisible:
    text: "Peers: 0"

# Verify legend section
- scrollUntilVisible:
    element:
      text: "Legend"
    direction: DOWN
- assertVisible: "Self (this device)"
- assertVisible:
    text: "Good signal.*"
- assertVisible:
    text: "Fair signal.*"
- assertVisible:
    text: "Poor signal.*"
