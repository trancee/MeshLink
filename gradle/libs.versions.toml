[versions]
kotlin              = "2.3.21"
agp                 = "9.2.0"
coroutines          = "1.10.2"
kover               = "0.9.8"
detekt              = "1.23.8"
ktfmt               = "0.26.0"
bcv                 = "0.18.1"
kotlinxBenchmark    = "0.4.16"
flatbuffers         = "25.2.10"
androidx-security-crypto = "1.1.0-alpha06"

[libraries]
kotlinx-coroutines-core    = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core",    version.ref = "coroutines" }
kotlinx-coroutines-test    = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-test",    version.ref = "coroutines" }
androidx-security-crypto   = { group = "androidx.security",     name = "security-crypto",             version.ref = "androidx-security-crypto" }
# NOTE: flatbuffers-kotlin does not exist on Maven Central as a separate artifact.
# flatbuffers-java covers JVM/Android usage; KMP support is embedded.
flatbuffers                = { group = "com.google.flatbuffers", name = "flatbuffers-java",           version.ref = "flatbuffers" }
kotlinx-benchmark-runtime  = { group = "org.jetbrains.kotlinx", name = "kotlinx-benchmark-runtime",  version.ref = "kotlinxBenchmark" }

[plugins]
kotlin-multiplatform              = { id = "org.jetbrains.kotlin.multiplatform",                      version.ref = "kotlin" }
# AGP 9.0+ requires the dedicated KMP library plugin; com.android.library is incompatible with KMP.
android-kotlin-multiplatform-library = { id = "com.android.kotlin.multiplatform.library",            version.ref = "agp" }
android-application               = { id = "com.android.application",                                version.ref = "agp" }
kover                             = { id = "org.jetbrains.kotlinx.kover",                             version.ref = "kover" }
detekt                            = { id = "io.gitlab.arturbosch.detekt",                             version.ref = "detekt" }
ktfmt                             = { id = "com.ncorti.ktfmt.gradle",                                 version.ref = "ktfmt" }
bcv                               = { id = "org.jetbrains.kotlinx.binary-compatibility-validator",    version.ref = "bcv" }
kotlinx-benchmark                 = { id = "org.jetbrains.kotlinx.benchmark",                        version.ref = "kotlinxBenchmark" }
kotlin-allopen                    = { id = "org.jetbrains.kotlin.plugin.allopen",                     version.ref = "kotlin" }
kotlin-power-assert               = { id = "org.jetbrains.kotlin.plugin.power-assert",               version.ref = "kotlin" }
